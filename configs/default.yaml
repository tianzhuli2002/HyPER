dataset:          '/data/sdellasa/QT_HyPER_Training/tuples_Class/nobtag'
train_set:        'training_dataset_odd'
val_set:          null #'training_dataset_even'
train_val_split:  0.5
max_n_events:     -1
drop_last:        False

# === DataModule settings (control data loading behavior) ===
datamodule:
  num_workers:       8              # Number of DataLoader workers (0=single-thread)
  pin_memory:        false           # Pin memory (disable on some cluster filesystems)
  cache_dir:         null            # Cache directory for processed events (null=use default)
  force_reload:      false           # Force rebuild cache (expensive!)
  use_ondisk:        false           # Use on-disk DB instead of lazy loading (fast for large jobs)

# === Trainer settings ===
trainer:
  gradient_clip:           null            # Clip gradients (e.g., 1.0 for stability)
  log_every_n_steps:       50              # Logging frequency
  log_graph:               false           # Disable graph logging for faster startup
  enable_device_stats:     false           # DeviceStatsMonitor can add overhead
  enable_early_stopping:   true
  validation_mode:         keep            # keep|fast
  checkpoint_mode:         keep_best_last  # keep_best_last|keep_best_only|last_only
  check_val_every_n_epoch: 1
  limit_val_batches:       1.0
  val_check_interval:      null
  num_sanity_val_steps:    0

num_message_layers:   3
hyperedge_order:      3
message_feats:        64
hyperedge_feats:      128
dropout:              0.01

optimizer:            "Adam"
learning_rate:        0.001
criterion_edge:       "BCE"
criterion_hyperedge:  "BCE"
loss_reduction:       "mean"
alpha:                0.5
beta:                 0.005

epochs:       300
patience:     30
batch_size:   4096

device:       "cpu"
num_devices:   16

savedir: "HyPER_logs"
continue_from_ckpt: null

predict_set:    'ttbar_SL_even'
predict_with:   "cpu"
predict_model:  "/home/sdellasa/QT_HyPER_Training/HyPER_pygDataset/HyPER/HyPER_logs/version_118"
predict_output: "/data/sdellasa/QT_HyPER_Training/tuples_Class/predictions/ttbar_SL_v118_even.pkl"
topology: 'ttbar_single_lep'

onnx_output:   "HyPER.onnx"
convert_model: null